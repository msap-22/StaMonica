<!DOCTYPE html>
<html>
<head>
    <title>Teste Firebase</title>
</head>
<body>
    <h1 id="status">Conectando...</h1>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getDatabase, ref, set, get } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAgEcWE25kHj9xMhJi9T15G1SFiXCA9GGA",
            authDomain: "controle-pagamento-64984.firebaseapp.com",
            databaseURL: "https://controle-pagamento-64984-default-rtdb.firebaseio.com",
            projectId: "controle-pagamento-64984",
            storageBucket: "controle-pagamento-64984.firebasestorage.app",
            messagingSenderId: "956557386879",
            appId: "1:956557386879:web:0270de5102cbf950f1cb4a"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            
            // Testa escrever
            await set(ref(db, 'teste'), 'funcionou');
            
            // Testa ler
            const snapshot = await get(ref(db, 'teste'));
            document.getElementById('status').innerText = 'Firebase OK: ' + snapshot.val();
            
        } catch (error) {
            document.getElementById('status').innerText = 'Erro: ' + error.message;
            console.error(error);
        }
    </script>
</body>
</html>
