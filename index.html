<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Pagamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100">

    <!-- TELA DE LOGIN -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h1 class="text-2xl font-bold mb-6 text-center">Controle de Pagamento</h1>
            <input id="senhaInput" type="password" placeholder="Digite a senha" class="w-full p-3 border rounded mb-4">
            <button onclick="fazerLogin()" class="w-full bg-blue-500 text-white p-3 rounded hover:bg-blue-600">Entrar</button>
            <p id="erroLogin" class="text-red-500 text-center mt-4 hidden">Senha incorreta</p>
            <p id="statusConexao" class="text-gray-500 text-center mt-4">Conectando ao Firebase...</p>
        </div>
    </div>

    <!-- TELA PRINCIPAL -->
    <div id="appScreen" class="hidden p-4 max-w-4xl mx-auto">
        <div class="bg-white rounded-lg shadow-md p-6 mb-4">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">Controle de Pagamento</h1>
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Sair</button>
            </div>

            <!-- SÓ ADMIN VÊ -->
            <div id="adminPanel" class="hidden mb-6">
                <h2 class="text-xl font-semibold mb-4">Adicionar Pessoa</h2>
                <div class="flex gap-2">
                    <input id="nomeInput" type="text" placeholder="Nome da pessoa" class="flex-1 p-2 border rounded">
                    <input id="valorInput" type="number" placeholder="Valor" class="w-32 p-2 border rounded">
                    <button onclick="adicionarPessoa()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Adicionar</button>
                </div>
            </div>

            <!-- LISTA DE PESSOAS -->
            <h2 class="text-xl font-semibold mb-4">Lista de Pagamentos</h2>
            <div id="listaPessoas" class="space-y-2"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getDatabase, ref, push, set, onValue, remove, update } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';

        // ========================================
        // CONFIGURAÇÃO DO FIREBASE
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAgEcWE25kHj9xMhJi9T15G1SFiXCA9GGA",
            authDomain: "controle-pagamento-64984.firebaseapp.com",
            databaseURL: "https://controle-pagamento-64984-default-rtdb.firebaseio.com",
            projectId: "controle-pagamento-64984",
            storageBucket: "controle-pagamento-64984.firebasestorage.app",
            messagingSenderId: "956557386879",
            appId: "1:956557386879:web:0270de5102cbf950f1cb4a"
        };

        // ========================================
        // VARIÁVEIS GLOBAIS
        // ========================================
        let db;
        let isAdmin = false;
        const SENHA_ADMIN = 'admin2026';
        const SENHA_CASA = 'casa';

        // ========================================
        // INICIA FIREBASE E DEPOIS LIBERA O LOGIN
        // ========================================
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            document.getElementById('statusConexao').innerText = 'Conectado! Digite a senha.';
            document.getElementById('statusConexao').className = 'text-green-500 text-center mt-4';
        } catch (error) {
            document.getElementById('statusConexao').innerText = 'Erro ao conectar: ' + error.message;
            document.getElementById('statusConexao').className = 'text-red-500 text-center mt-4';
        }

        // ========================================
        // FUNÇÕES
        // ========================================
        window.fazerLogin = function() {
            const senha = document.getElementById('senhaInput').value;
            
            if (senha === SENHA_ADMIN) {
                isAdmin = true;
                entrarNoApp();
            } else if (senha === SENHA_CASA) {
                isAdmin = false;
                entrarNoApp();
            } else {
                document.getElementById('erroLogin').classList.remove('hidden');
            }
        }

        function entrarNoApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            
            if (isAdmin) {
                document.getElementById('adminPanel').classList.remove('hidden');
            }
            
            carregarPessoas();
        }

        window.logout = function() {
            location.reload();
        }

        window.adicionarPessoa = function() {
            const nome = document.getElementById('nomeInput').value;
            const valor = document.getElementById('valorInput').value;
            
            if (!nome || !valor) {
                alert('Preencha nome e valor');
                return;
            }

            push(ref(db, 'pessoas'), {
                nome: nome,
                valor: parseFloat(valor),
                pago: false,
                dataCriacao: Date.now()
            });

            document.getElementById('nomeInput').value = '';
            document.getElementById('valorInput').value = '';
        }

        function carregarPessoas() {
            onValue(ref(db, 'pessoas'), (snapshot) => {
                const lista = document.getElementById('listaPessoas');
                lista.innerHTML = '';
                
                if (!snapshot.exists()) {
                    lista.innerHTML = '<p class="text-gray-500">Nenhuma pessoa cadastrada</p>';
                    return;
                }

                snapshot.forEach((child) => {
                    const id = child.key;
                    const pessoa = child.val();
                    
                    const div = document.createElement('div');
                    div.className = 'flex justify-between items-center p-3 border rounded ' + (pessoa.pago ? 'bg-green-50' : 'bg-white');
                    
                    div.innerHTML = `
                        <div>
                            <span class="font-semibold">${pessoa.nome}</span>
                            <span class="ml-4">R$ ${pessoa.valor.toFixed(2)}</span>
                            ${pessoa.pago ? '<span class="ml-2 text-green-600 text-sm">✓ Pago</span>' : ''}
                        </div
