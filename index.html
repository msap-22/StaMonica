<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Pagamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
       .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Tela de Login -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h1 class="text-2xl font-bold mb-6 text-center">Controle de Pagamento</h1>
            <input type="password" id="senhaInput" placeholder="Digite a senha" class="w-full p-3 border rounded mb-4">
            <button onclick="fazerLogin()" class="w-full bg-blue-500 text-white p-3 rounded hover:bg-blue-600">Entrar</button>
            <p id="erroLogin" class="text-red-500 text-sm mt-2 hidden">Senha incorreta</p>
        </div>
    </div>

    <!-- Tela Principal -->
    <div id="mainScreen" class="hidden">
        <div class="container mx-auto p-4">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">Controle de Pagamento</h1>
                <div>
                    <span id="statusConexao" class="text-sm mr-4">Conectando ao Firebase...</span>
                    <button onclick="sair()" class="bg-red-500 text-white px-4 py-2 rounded">Sair</button>
                </div>
            </div>

            <div id="adminArea" class="hidden mb-6">
                <div class="bg-white p-4 rounded shadow">
                    <h2 class="font-bold mb-2">Adicionar Pessoa</h2>
                    <input type="text" id="nomeInput" placeholder="Nome" class="p-2 border rounded mr-2">
                    <input type="number" id="valorInput" placeholder="Valor" class="p-2 border rounded mr-2">
                    <button onclick="addPessoa()" class="bg-green-500 text-white px-4 py-2 rounded">Adicionar</button>
                </div>
            </div>

            <div id="listaPessoas" class="grid gap-4"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getDatabase, ref, push, set, onValue, remove, update } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';

        // ========================================
        // CONFIGURAÇÃO DO FIREBASE
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAgEcWE25kHj9xMhJi9T15G1SFiXCA9GGA",
            authDomain: "controle-pagamento-64984.firebaseapp.com",
            databaseURL: "https://controle-pagamento-64984-default-rtdb.firebaseio.com",
            projectId: "controle-pagamento-64984",
            storageBucket: "controle-pagamento-64984.firebasestorage.app",
            messagingSenderId: "956557386879",
            appId: "1:956557386879:web:0270de5102cbf950f1cb4a"
        };

        let app, db, isAdmin = false;

        // Inicia Firebase só depois que a página carrega
        window.onload = async () => {
            try {
                app = initializeApp(firebaseConfig);
                db = getDatabase(app);
                console.log('Firebase conectado');
            } catch (error) {
                document.getElementById('statusConexao').innerText = 'Erro no Firebase';
                console.error(error);
            }
        };

        window.fazerLogin = () => {
            const senha = document.getElementById('senhaInput').value;
            if (senha === 'admin2026') {
                isAdmin = true;
                iniciarSistema();
            } else if (senha === 'casa') {
                isAdmin = false;
                iniciarSistema();
            } else {
                document.getElementById('erroLogin').classList.remove('hidden');
            }
        };

        function iniciarSistema() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');

            if (isAdmin) {
                document.getElementById('adminArea').classList.remove('hidden');
            }

            // Só carrega os dados DEPOIS do login
            const pessoasRef = ref(db, 'pessoas');
            onValue(pessoasRef, (snapshot) => {
                document.getElementById('statusConexao').innerText = 'Conectado ✓';
                document.getElementById('statusConexao').className = 'text-sm mr-4 text-green-600';

                const data = snapshot.val();
                const lista = document.getElementById('listaPessoas');
                lista.innerHTML = '';

                if (data) {
                    Object.keys(data).forEach(key => {
                        const pessoa = data[key];
                        lista.innerHTML += `
                            <div class="bg-white p-4 rounded shadow flex justify-between">
                                <div>
                                    <p class="font-bold">${pessoa.nome}</p>
                                    <p>R$ ${pessoa.valor}</p>
                                </div>
                                ${isAdmin? `<button onclick="delPessoa('${key}')" class="text-red-500">Excluir</button>` : ''}
                            </div>
                        `;
                    });
                } else {
                    lista.innerHTML = '<p class="text-gray-500">Nenhuma pessoa cadastrada</p>';
                }
            }, (error) => {
                document.getElementById('statusConexao').innerText = 'Erro: ' + error.message;
                document.getElementById('statusConexao').className = 'text-sm mr-4 text-red-600';
            });
        }

        window.addPessoa = () => {
            const nome = document.getElementById('nomeInput').value;
            const valor = document.getElementById('valorInput').value;
            if (nome && valor) {
                push(ref(db, 'pessoas'), { nome, valor });
                document.getElementById('nomeInput').value = '';
                document.getElementById('valorInput').value = '';
            }
        };

        window.delPessoa = (key) => {
            remove(ref(db, 'pessoas/' + key));
        };

        window.sair = () => {
            location.reload();
        };
    </script>
</body>
</html>
